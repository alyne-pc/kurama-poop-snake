<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Kurama Poop Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100dvh;
    font-family: 'Segoe UI', sans-serif;
    color: #111;
    touch-action: none;
    overflow: hidden;
  }
  h1 { font-size: 1.2rem; margin-bottom: 4px; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
  h1 img { width: 28px; height: 28px; border-radius: 50%; }
  #info { font-size: 0.75rem; color: #333; margin-bottom: 6px; text-align: center; }
  #score-board { display: flex; gap: 20px; margin-bottom: 8px; }
  .score-box {
    background: #f5f0e8;
    border: 2px solid #8B4513;
    border-radius: 10px;
    padding: 4px 14px;
    text-align: center;
    font-size: 0.75rem;
    color: #333;
  }
  .score-box span { display: block; font-size: 1.1rem; font-weight: bold; color: #111; }
  canvas {
    border: 3px solid #8B4513;
    border-radius: 12px;
    background: #fff;
    box-shadow: 0 0 20px #8B451344;
  }
  #msg { margin-top: 6px; font-size: 0.85rem; color: #333; height: 20px; text-align: center; }
  #restart {
    margin-top: 6px;
    padding: 6px 24px;
    background: #8B4513;
    color: #f2dfd3;
    border: none;
    border-radius: 20px;
    font-size: 0.9rem;
    cursor: pointer;
    display: none;
    align-items: center;
    gap: 6px;
  }
  #restart img { width: 22px; height: 22px; border-radius: 50%; }
  #restart:hover { background: #a0522d; }

  #dpad {
    margin-top: 10px;
    display: grid;
    grid-template-areas: ". up ." "left . right" ". down .";
    gap: 5px;
  }
  .dpad-btn {
    width: 52px; height: 52px;
    background: #f5f0e8;
    border: 2px solid #8B4513;
    border-radius: 12px;
    font-size: 1.3rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .dpad-btn:active { background: #8B4513; }
  #btn-up { grid-area: up; }
  #btn-left { grid-area: left; }
  #btn-right { grid-area: right; }
  #btn-down { grid-area: down; }
</style>
</head>
<body>
<h1><img id="title-img" src="https://i.postimg.cc/v834M6wT/be8c9869-1ab9-4d0f-b3ca-bed9f6a6168c.png"> Kurama Poop Snake 💩</h1>
<div id="info">💻 Setas do teclado &nbsp;|&nbsp; 📱 Deslize ou use os botões!</div>
<div id="score-board">
  <div class="score-box">Pontuação<span id="score">0</span></div>
  <div class="score-box">Recorde<span id="best">0</span></div>
</div>
<canvas id="c"></canvas>
<div id="msg">Pressione qualquer seta para começar!</div>
<button id="restart" onclick="init()"><img src="https://i.postimg.cc/v834M6wT/be8c9869-1ab9-4d0f-b3ca-bed9f6a6168c.png"> Jogar de novo</button>

<div id="dpad">
  <button class="dpad-btn" id="btn-up">⬆️</button>
  <button class="dpad-btn" id="btn-left">⬅️</button>
  <button class="dpad-btn" id="btn-right">➡️</button>
  <button class="dpad-btn" id="btn-down">⬇️</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const msgEl = document.getElementById('msg');
const restartBtn = document.getElementById('restart');

// Tamanho do canvas baseado no espaço disponível
const vw = window.innerWidth;
const vh = window.innerHeight;
const isMobile = vw < 600;
const maxCanvas = isMobile ? Math.min(vw * 0.92, vh * 0.45) : Math.min(vw * 0.6, vh * 0.5, 400);
const SIZE = Math.max(Math.floor(maxCanvas / 20) * 20, 200);
canvas.width = SIZE; canvas.height = SIZE;
const SZ = SIZE / 20, COLS = 20, ROWS = 20;

const BODY_HEARTS = ['🤎','🖤','🤍'];
const BODY = i => BODY_HEARTS[i % BODY_HEARTS.length];
const MSGS = [
  '🐶 Para com isso, Kurama!',
  '💩 Tão linda, pena que come cocô!',
  '🐾 Poxa vida, Kurama!',
  '🐶 Mas não é possível!',
  '💩 Solta esse cocô!',
];

// Pré-carrega a imagem antes de tudo
const HEAD_IMG = new Image();
HEAD_IMG.crossOrigin = 'anonymous';

let snake, dir, nextDir, food, score, best = 0, started = false, loop;

function init() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; scoreEl.textContent = 0;
  started = false;
  msgEl.textContent = 'Pressione qualquer seta para começar!';
  restartBtn.style.display = 'none';
  placeFood(); clearInterval(loop); draw();
}

function placeFood() {
  let pos;
  do { pos = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
  while (snake.some(s=>s.x===pos.x&&s.y===pos.y));
  food = pos;
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='#8B4513'; ctx.lineWidth=0.4;
  for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*SZ,0);ctx.lineTo(i*SZ,canvas.height);ctx.stroke();}
  for(let j=0;j<=ROWS;j++){ctx.beginPath();ctx.moveTo(0,j*SZ);ctx.lineTo(canvas.width,j*SZ);ctx.stroke();}

  ctx.font=`${SZ-2}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('💩', food.x*SZ+SZ/2, food.y*SZ+SZ/2);
  for(let i=1;i<snake.length;i++) ctx.fillText(BODY(i), snake[i].x*SZ+SZ/2, snake[i].y*SZ+SZ/2);

  if(HEAD_IMG.complete && HEAD_IMG.naturalWidth>0){
    ctx.save();
    ctx.beginPath();
    ctx.arc(snake[0].x*SZ+SZ/2, snake[0].y*SZ+SZ/2, SZ/2, 0, Math.PI*2);
    ctx.clip();
    ctx.drawImage(HEAD_IMG, snake[0].x*SZ, snake[0].y*SZ, SZ, SZ);
    ctx.restore();
  } else {
    ctx.font=`${SZ}px serif`;
    ctx.fillText('🐶', snake[0].x*SZ+SZ/2, snake[0].y*SZ+SZ/2);
  }
}

function step() {
  dir=nextDir;
  const head={x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS) return gameOver();
  if(snake.some(s=>s.x===head.x&&s.y===head.y)) return gameOver();
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score++; scoreEl.textContent=score;
    if(score>best){best=score;bestEl.textContent=best;}
    placeFood();
    msgEl.textContent=MSGS[Math.floor(Math.random()*MSGS.length)];
  } else snake.pop();
  draw();
}

function gameOver(){
  clearInterval(loop); started=false;
  msgEl.textContent=`💔 A Kurama vomitou! Você fez ${score} pontos!`;
  restartBtn.style.display='flex';
  draw();
}

function move(d){
  if(d.x===-dir.x&&d.y===-dir.y) return;
  nextDir=d;
  if(!started){
    started=true;
    msgEl.textContent='🐶 Solta esse cocô, Kurama!';
    loop=setInterval(step,150);
  }
}

// Teclado
document.addEventListener('keydown', e=>{
  const keys={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0}};
  if(!keys[e.key]) return;
  e.preventDefault();
  move(keys[e.key]);
});

// D-pad
document.getElementById('btn-up').addEventListener('touchstart',e=>{e.preventDefault();move({x:0,y:-1});},{passive:false});
document.getElementById('btn-down').addEventListener('touchstart',e=>{e.preventDefault();move({x:0,y:1});},{passive:false});
document.getElementById('btn-left').addEventListener('touchstart',e=>{e.preventDefault();move({x:-1,y:0});},{passive:false});
document.getElementById('btn-right').addEventListener('touchstart',e=>{e.preventDefault();move({x:1,y:0});},{passive:false});

// Swipe
let tx=0,ty=0;
canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;e.preventDefault();},{passive:false});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<15&&Math.abs(dy)<15) return;
  if(Math.abs(dx)>Math.abs(dy)) move(dx>0?{x:1,y:0}:{x:-1,y:0});
  else move(dy>0?{x:0,y:1}:{x:0,y:-1});
  e.preventDefault();
},{passive:false});

// Carrega imagem primeiro, depois inicia
HEAD_IMG.onload = () => init();
HEAD_IMG.onerror = () => init();
HEAD_IMG.src = 'https://i.postimg.cc/v834M6wT/be8c9869-1ab9-4d0f-b3ca-bed9f6a6168c.png';
</script>
</body>
</html>
